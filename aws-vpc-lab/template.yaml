AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Highly Available Multi-AZ VPC Lab - Two public subnets with Apache web tier, Two private subnets with app tier, SSM Session Manager access only.

# =========================================================
# PARAMETERS
# =========================================================
Parameters:

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  PublicSubnetACIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR for public subnet in AZ-A

  PublicSubnetBCIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR for public subnet in AZ-B

  PrivateSubnetACIDR:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR for private subnet in AZ-A

  PrivateSubnetBCIDR:
    Type: String
    Default: 10.0.4.0/24
    Description: CIDR for private subnet in AZ-B

# =========================================================
# RESOURCES
# =========================================================
Resources:

  # ---------------------------------------------------------
  # SECTION 1 — VPC
  # ---------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: lab-vpc

  # ---------------------------------------------------------
  # SECTION 2 — INTERNET GATEWAY
  # ---------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: lab-igw

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------------------------------------------------
  # SECTION 3 — SUBNETS
  # Two public, two private — one of each per AZ
  # ---------------------------------------------------------
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetACIDR
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetBCIDR
      AvailabilityZone: !Select
        - 1
        - !GetAZs ''
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-b

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetACIDR
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: private-subnet-a

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetBCIDR
      AvailabilityZone: !Select
        - 1
        - !GetAZs ''
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: private-subnet-b

  # ---------------------------------------------------------
  # SECTION 4 — ROUTE TABLES
  # 1 public route table shared by both public subnets
  # 2 private route tables — one per AZ (no cross-AZ dependency)
  # NAT Gateway routes will be added in the next section
  # ---------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachIGW
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: private-rt-a

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: private-rt-b

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

# ---------------------------------------------------------
  # SECTION 5 — ELASTIC IPs FOR NAT GATEWAYS
  # one EIP per NAT Gateway — required before NAT GW creation
  # ---------------------------------------------------------
  EIPA:
    Type: AWS::EC2::EIP
    DependsOn: AttachIGW
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: lab-eip-nat-a

  EIPB:
    Type: AWS::EC2::EIP
    DependsOn: AttachIGW
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: lab-eip-nat-b

  # ---------------------------------------------------------
  # SECTION 6 — NAT GATEWAYS
  # one per AZ, each in its own PUBLIC subnet
  # private subnets route outbound traffic through their
  # local NAT only — no cross-AZ dependency
  # ---------------------------------------------------------
  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIPA.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: lab-nat-gw-a

  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIPB.AllocationId
      SubnetId: !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: lab-nat-gw-b

  # ---------------------------------------------------------
  # SECTION 7 — PRIVATE ROUTES
  # each private route table points ONLY to its AZ-local NAT
  # AZ-A private subnet → NatGatewayA (never NatGatewayB)
  # AZ-B private subnet → NatGatewayB (never NatGatewayA)
  # this is what satisfies "no cross-AZ NAT dependency"
  # ---------------------------------------------------------
  PrivateRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA

  PrivateRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayB
      
  # ---------------------------------------------------------
  # SECTION 8 — IAM ROLE AND INSTANCE PROFILE
  # grants EC2 instances permission to register with SSM
  # all four instances share this single profile
  # no SSH keys, no bastion — SSM is the only access method
  # ---------------------------------------------------------
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lab-ssm-instance-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: lab-ssm-instance-role

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: lab-ssm-instance-profile
      Roles:
        - !Ref SSMInstanceRole

  # ---------------------------------------------------------
  # SECTION 9 — SECURITY GROUPS
  # follows least-privilege — only required ports open
  # NO port 22 anywhere in this template
  # ---------------------------------------------------------

  # Web tier SG — public EC2 instances
  # allows HTTP from internet and ICMP for ping validation
  WebTierSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: lab-web-tier-sg
      GroupDescription: Web tier - HTTP and ICMP only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - Description: HTTP from internet
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - Description: ICMP ping from internet
          IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - Description: All outbound traffic
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: lab-web-tier-sg

  # App tier SG — private EC2 instances
  # allows ICMP from within VPC only for ping validation
  # no inbound HTTP, no inbound SSH
  AppTierSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: lab-app-tier-sg
      GroupDescription: App tier - ICMP from VPC only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - Description: ICMP ping from within VPC only
          IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: !Ref VpcCIDR
      SecurityGroupEgress:
        - Description: All outbound traffic
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: lab-app-tier-sg

  # ---------------------------------------------------------
  # SECTION 10 — EC2 INSTANCES
  # Amazon Linux 2023 AMI (SSM agent pre-installed)
  # public instances run Apache via UserData
  # private instances have no public IP
  # all four use SSMInstanceProfile — no key pairs needed
  # ---------------------------------------------------------

  # --- Web Tier — AZ-A ---
  WebServerA:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref PublicSubnetA
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref WebTierSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          cat > /var/www/html/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
            <head>
              <title>AWS VPC Lab</title>
              <style>
                body { font-family: Arial, sans-serif; text-align: center; margin-top: 80px; background: #f4f4f4; }
                .card { display: inline-block; padding: 40px 60px; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
                h1 { color: #232f3e; }
                p  { color: #555; font-size: 18px; }
                ul { text-align: left; color: #555; font-size: 18px; }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>AWS VPC Lab</h1>
                <p>Full Name: Jacob Quaye</p>
                <p>Lab Name: Securely deploying resources in a VPC using cfn LAB</p>
              </div>
            </body>
          </html>
          HTML
          systemctl enable httpd
          systemctl start httpd
      Tags:
        - Key: Name
          Value: web-server-a

  # --- Web Tier — AZ-B ---
  WebServerB:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref PublicSubnetB
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref WebTierSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          cat > /var/www/html/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
            <head>
              <title>AWS VPC Lab</title>
              <style>
                body { font-family: Arial, sans-serif; text-align: center; margin-top: 80px; background: #f4f4f4; }
                .card { display: inline-block; padding: 40px 60px; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
                h1 { color: #232f3e; }
                p  { color: #555; font-size: 18px; }
                ul { text-align: left; color: #555; font-size: 18px; }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>AWS VPC Lab</h1>
                <p>Full Name: Jacob Quaye</p>
                <p>Lab Name: Securely deploying resources in a VPC using cfn LAB</p>
              </div>
            </body>
          </html>
          HTML
          systemctl enable httpd
          systemctl start httpd
      Tags:
        - Key: Name
          Value: web-server-b

  # --- App Tier — AZ-A ---
  AppServerA:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref PrivateSubnetA
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref AppTierSG
      Tags:
        - Key: Name
          Value: app-server-a

  # --- App Tier — AZ-B ---
  AppServerB:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref PrivateSubnetB
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref AppTierSG
      Tags:
        - Key: Name
          Value: app-server-b

# =========================================================
# OUTPUTS
# =========================================================
Outputs:

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: lab-vpc-id

  PublicSubnetAId:
    Description: Public Subnet A ID
    Value: !Ref PublicSubnetA
    Export:
      Name: lab-public-subnet-a-id

  PublicSubnetBId:
    Description: Public Subnet B ID
    Value: !Ref PublicSubnetB
    Export:
      Name: lab-public-subnet-b-id

  PrivateSubnetAId:
    Description: Private Subnet A ID
    Value: !Ref PrivateSubnetA
    Export:
      Name: lab-private-subnet-a-id

  PrivateSubnetBId:
    Description: Private Subnet B ID
    Value: !Ref PrivateSubnetB
    Export:
      Name: lab-private-subnet-b-id

  NatGatewayAId:
    Description: NAT Gateway A ID
    Value: !Ref NatGatewayA
    Export:
      Name: lab-nat-gw-a-id

  NatGatewayBId:
    Description: NAT Gateway B ID
    Value: !Ref NatGatewayB
    Export:
      Name: lab-nat-gw-b-id

  EIPAAddress:
    Description: Elastic IP for NAT Gateway A
    Value: !Ref EIPA
    Export:
      Name: lab-eip-a

  EIPBAddress:
    Description: Elastic IP for NAT Gateway B
    Value: !Ref EIPB
    Export:
      Name: lab-eip-b

  WebServerAPublicIP:
    Description: Web Server A public IP
    Value: !GetAtt WebServerA.PublicIp
    Export:
      Name: lab-web-server-a-ip

  WebServerBPublicIP:
    Description: Web Server B public IP
    Value: !GetAtt WebServerB.PublicIp
    Export:
      Name: lab-web-server-b-ip

  AppServerAPrivateIP:
    Description: App Server A private IP
    Value: !GetAtt AppServerA.PrivateIp
    Export:
      Name: lab-app-server-a-ip

  AppServerBPrivateIP:
    Description: App Server B private IP
    Value: !GetAtt AppServerB.PrivateIp
    Export:
      Name: lab-app-server-b-ip
      
Metadata:
  AWS::Composer::Groups:
    Group:
      Label: Group
      Members:
        - PublicSubnetB

