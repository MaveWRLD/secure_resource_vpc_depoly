AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Highly Available Multi-AZ VPC Lab - Two public subnets with Apache web tier, Two private subnets with app tier, SSM Session Manager access only.

# =========================================================
# PARAMETERS
# =========================================================
Parameters:

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  PublicSubnetACIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR for public subnet in AZ-A

  PublicSubnetBCIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR for public subnet in AZ-B

  PrivateSubnetACIDR:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR for private subnet in AZ-A

  PrivateSubnetBCIDR:
    Type: String
    Default: 10.0.4.0/24
    Description: CIDR for private subnet in AZ-B

# =========================================================
# RESOURCES
# =========================================================
Resources:

  # ---------------------------------------------------------
  # SECTION 1 — VPC
  # ---------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: lab-vpc

  # ---------------------------------------------------------
  # SECTION 2 — INTERNET GATEWAY
  # ---------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: lab-igw

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------------------------------------------------
  # SECTION 3 — SUBNETS
  # Two public, two private — one of each per AZ
  # ---------------------------------------------------------
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetACIDR
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetBCIDR
      AvailabilityZone: !Select
        - 1
        - !GetAZs ''
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-b

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetACIDR
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: private-subnet-a

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetBCIDR
      AvailabilityZone: !Select
        - 1
        - !GetAZs ''
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: private-subnet-b

  # ---------------------------------------------------------
  # SECTION 4 — ROUTE TABLES
  # 1 public route table shared by both public subnets
  # 2 private route tables — one per AZ (no cross-AZ dependency)
  # NAT Gateway routes will be added in the next section
  # ---------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachIGW
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: private-rt-a

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: private-rt-b

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

# ---------------------------------------------------------
  # SECTION 5 — ELASTIC IPs FOR NAT GATEWAYS
  # one EIP per NAT Gateway — required before NAT GW creation
  # ---------------------------------------------------------
  EIPA:
    Type: AWS::EC2::EIP
    DependsOn: AttachIGW
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: lab-eip-nat-a

  EIPB:
    Type: AWS::EC2::EIP
    DependsOn: AttachIGW
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: lab-eip-nat-b

  # ---------------------------------------------------------
  # SECTION 6 — NAT GATEWAYS
  # one per AZ, each in its own PUBLIC subnet
  # private subnets route outbound traffic through their
  # local NAT only — no cross-AZ dependency
  # ---------------------------------------------------------
  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIPA.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: lab-nat-gw-a

  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIPB.AllocationId
      SubnetId: !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: lab-nat-gw-b

  # ---------------------------------------------------------
  # SECTION 7 — PRIVATE ROUTES
  # each private route table points ONLY to its AZ-local NAT
  # AZ-A private subnet → NatGatewayA (never NatGatewayB)
  # AZ-B private subnet → NatGatewayB (never NatGatewayA)
  # this is what satisfies "no cross-AZ NAT dependency"
  # ---------------------------------------------------------
  PrivateRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA

  PrivateRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayB

# =========================================================
# OUTPUTS
# =========================================================
Outputs:

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: lab-vpc-id

  PublicSubnetAId:
    Description: Public Subnet A ID
    Value: !Ref PublicSubnetA
    Export:
      Name: lab-public-subnet-a-id

  PublicSubnetBId:
    Description: Public Subnet B ID
    Value: !Ref PublicSubnetB
    Export:
      Name: lab-public-subnet-b-id

  PrivateSubnetAId:
    Description: Private Subnet A ID
    Value: !Ref PrivateSubnetA
    Export:
      Name: lab-private-subnet-a-id

  PrivateSubnetBId:
    Description: Private Subnet B ID
    Value: !Ref PrivateSubnetB
    Export:
      Name: lab-private-subnet-b-id

  NatGatewayAId:
    Description: NAT Gateway A ID
    Value: !Ref NatGatewayA
    Export:
      Name: lab-nat-gw-a-id

  NatGatewayBId:
    Description: NAT Gateway B ID
    Value: !Ref NatGatewayB
    Export:
      Name: lab-nat-gw-b-id

  EIPAAddress:
    Description: Elastic IP for NAT Gateway A
    Value: !Ref EIPA
    Export:
      Name: lab-eip-a

  EIPBAddress:
    Description: Elastic IP for NAT Gateway B
    Value: !Ref EIPB
    Export:
      Name: lab-eip-b
      
Metadata:
  AWS::Composer::Groups:
    Group:
      Label: Group
      Members:
        - PublicSubnetB

